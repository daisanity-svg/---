name: JPYTWDConverter
options:
  bundleIdPrefix: com.daisanity
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: FNRFZAPUUM
targets:
  JPYTWDConverter:
    type: application
    platform: iOS
    sources:
      - Sources/App
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daisanity.jpytwdconverter
        INFOPLIST_FILE: Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: FNRFZAPUUM
    dependencies:
      - target: JPYTWDConverterWidgetExtension
  JPYTWDConverterWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Widget
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daisanity.jpytwdconverter.widget
        INFOPLIST_FILE: Sources/Widget/Info.plist
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        DEVELOPMENT_TEAM: FNRFZAPUUM
